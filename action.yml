name: 'Vibers Code Review'
description: 'Human-in-the-loop code review for vibecoded projects. Reviews commits against your spec, fixes issues, sends PRs.'
author: 'marsiandeployer'

branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  spec_url:
    description: 'URL to your spec document (Google Doc, Notion, etc.)'
    required: false
    default: ''
  review_scope:
    description: 'Review scope: full, security, spec-compliance'
    required: false
    default: 'full'
  telegram_contact:
    description: 'Your Telegram handle for review delivery'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Get changed files
      id: changed
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null || git diff --name-only HEAD~1)
        else
          FILES=$(git diff --name-only HEAD~1 2>/dev/null || echo "")
        fi
        echo "files<<EOF" >> $GITHUB_OUTPUT
        echo "$FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        FILE_COUNT=$(echo "$FILES" | grep -c '[^[:space:]]' || echo "0")
        echo "count=$FILE_COUNT" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Notify Vibers
      shell: bash
      run: |
        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://vibers.onout.org/review" \
          -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg author "${{ github.actor }}" \
            --arg spec "${{ inputs.spec_url }}" \
            --arg scope "${{ inputs.review_scope }}" \
            --arg contact "${{ inputs.telegram_contact }}" \
            --arg files "${{ steps.changed.outputs.files }}" \
            '{repo: $repo, branch: $branch, sha: $sha, author: $author, spec_url: $spec, scope: $scope, contact: $contact, changed_files: $files}')" \
          2>/dev/null || echo -e '{"error":"network"}\n000')

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | head -1)

        if [ "$HTTP_CODE" = "200" ]; then
          echo "Vibers notified successfully"
        else
          echo "::warning::Vibers notification failed (HTTP $HTTP_CODE): $BODY"
        fi

        echo "## Vibers Review Submitted" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Repo:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "**Scope:** ${{ inputs.review_scope }}" >> $GITHUB_STEP_SUMMARY
        if [ -n "${{ inputs.spec_url }}" ]; then
          echo "**Spec:** ${{ inputs.spec_url }}" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Changed files (${{ steps.changed.outputs.count }}):" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.changed.outputs.files }}" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "**marsiandeployer** will review and submit a PR with fixes." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "[Vibers](https://vibers.onout.org) | [Telegram](https://t.me/onoutnoxon)" >> $GITHUB_STEP_SUMMARY

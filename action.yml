name: 'Vibers Code Review'
description: 'Human-in-the-loop code review for vibecoded projects. Reviews commits against your spec, fixes issues, sends PRs.'
author: 'marsiandeployer'

branding:
  icon: 'check-circle'
  color: 'purple'

# ⚠️ First: add Vibers reviewer (marsiandeployer) as collaborator → repo Settings → Collaborators
inputs:
  spec_url:
    description: 'URL to your spec document (Google Doc, Notion, etc.)'
    required: false
    default: ''
  review_scope:
    description: 'Review scope: full, security, spec-compliance'
    required: false
    default: 'full'
  telegram_contact:
    description: 'Your Telegram handle for review delivery'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Collect review context
      id: context
      shell: bash
      run: |
        # --- Determine commit range ---
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          # Fallback: if before is all zeros (first push to branch), use HEAD~1
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD~1"
          fi
        fi

        # --- Changed files ---
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null || git diff --name-only "$BASE_SHA" "$HEAD_SHA")
        else
          FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")
        fi
        FILE_COUNT=$(echo "$FILES" | grep -c '[^[:space:]]' || true)
        [ -z "$FILE_COUNT" ] && FILE_COUNT=0

        # --- Diff stat (full pushed range) ---
        DIFF_STAT=$(git diff --stat "$BASE_SHA" "$HEAD_SHA" 2>/dev/null | tail -1 || true)

        # --- Commit messages for full range ---
        COMMIT_MSG=$(git log --pretty=format:"%s" "$BASE_SHA..$HEAD_SHA" 2>/dev/null | head -5 | paste -sd ' | ' || echo "")
        COMMIT_BODY=$(git log --pretty=format:"%b" "$BASE_SHA..$HEAD_SHA" 2>/dev/null || echo "")

        # --- Extract URLs from README ---
        URLS=""
        for f in README.md README.rst README readme.md; do
          if [ -f "$f" ]; then
            # Extract http(s) URLs, demo/staging/production/preview keywords nearby
            URLS=$(grep -oiE 'https?://[^ )"]+' "$f" 2>/dev/null | grep -viE 'shields\.io|github\.com/(actions|features|pricing)|img\.shields' | head -10 | sort -u || true)
            break
          fi
        done

        # --- Extract credentials/test accounts from README or .env.example ---
        CREDS=""
        for f in README.md README.rst readme.md .env.example .env.sample; do
          if [ -f "$f" ]; then
            # Look for login/password/email/test patterns
            FOUND=$(grep -inE '(test.*user|demo.*account|login|password|email.*test|credentials|default.*admin|guest|sample.*auth)' "$f" 2>/dev/null | head -5 || true)
            if [ -n "$FOUND" ]; then
              CREDS="${CREDS}${f}:\n${FOUND}\n"
            fi
          fi
        done

        # --- Check for deploy/preview URLs in package.json or config ---
        DEPLOY_URL=""
        if [ -f "package.json" ]; then
          DEPLOY_URL=$(jq -r '.homepage // empty' package.json 2>/dev/null || echo "")
        fi
        # Vercel/Netlify project
        if [ -f "vercel.json" ]; then
          DEPLOY_URL="${DEPLOY_URL} (vercel project)"
        fi
        if [ -f "netlify.toml" ]; then
          DEPLOY_URL="${DEPLOY_URL} (netlify project)"
        fi

        # --- Tech stack detection ---
        STACK=""
        [ -f "package.json" ] && STACK="${STACK}node " || true
        { [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; } && STACK="${STACK}python " || true
        [ -f "Gemfile" ] && STACK="${STACK}ruby " || true
        [ -f "go.mod" ] && STACK="${STACK}go " || true
        [ -f "Cargo.toml" ] && STACK="${STACK}rust " || true
        { [ -f "docker-compose.yml" ] || [ -f "Dockerfile" ]; } && STACK="${STACK}docker " || true
        [ -d ".github/workflows" ] && STACK="${STACK}ci " || true
        STACK=$(echo "$STACK" | xargs || echo "")

        # --- Output all ---
        echo "files<<EOF" >> $GITHUB_OUTPUT
        echo "$FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "count=$FILE_COUNT" >> $GITHUB_OUTPUT

        echo "diff_stat<<EOF" >> $GITHUB_OUTPUT
        echo "$DIFF_STAT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "commit_body<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMIT_BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "urls<<EOF" >> $GITHUB_OUTPUT
        echo "$URLS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "creds<<EOF" >> $GITHUB_OUTPUT
        echo -e "$CREDS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "deploy_url<<EOF" >> $GITHUB_OUTPUT
        echo "$DEPLOY_URL" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "stack=$STACK" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Notify Vibers
      shell: bash
      run: |
        PAYLOAD=$(jq -n \
          --arg repo "$V_REPO" \
          --arg branch "$V_BRANCH" \
          --arg sha "$V_SHA" \
          --arg author "$V_AUTHOR" \
          --arg spec_url "$V_SPEC" \
          --arg scope "$V_SCOPE" \
          --arg contact "$V_CONTACT" \
          --arg changed_files "$V_FILES" \
          --arg commit_msg "$V_COMMIT_MSG" \
          --arg commit_body "$V_COMMIT_BODY" \
          --arg diff_stat "$V_DIFF_STAT" \
          --arg urls "$V_URLS" \
          --arg creds "$V_CREDS" \
          --arg deploy_url "$V_DEPLOY_URL" \
          --arg stack "$V_STACK" \
          '$ARGS.named')

        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://vibers.onout.org/review" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          2>/dev/null || echo -e '{"error":"network"}\n000')

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | head -1)

        if [ "$HTTP_CODE" = "200" ]; then
          echo "Vibers notified successfully"
        else
          echo "::warning::Vibers notification failed (HTTP $HTTP_CODE): $BODY"
        fi

        # Summary
        echo "## Vibers Review Submitted" >> $GITHUB_STEP_SUMMARY
        echo "**Repo:** $V_REPO | **Branch:** $V_BRANCH" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** \`${V_SHA:0:8}\` — $V_COMMIT_MSG" >> $GITHUB_STEP_SUMMARY
        echo "**Stack:** $V_STACK | **Stat:** $V_DIFF_STAT" >> $GITHUB_STEP_SUMMARY
      env:
        V_REPO: ${{ github.repository }}
        V_BRANCH: ${{ github.ref_name }}
        V_SHA: ${{ github.sha }}
        V_AUTHOR: ${{ github.actor }}
        V_SPEC: ${{ inputs.spec_url }}
        V_SCOPE: ${{ inputs.review_scope }}
        V_CONTACT: ${{ inputs.telegram_contact }}
        V_FILES: ${{ steps.context.outputs.files }}
        V_COMMIT_MSG: ${{ steps.context.outputs.commit_msg }}
        V_COMMIT_BODY: ${{ steps.context.outputs.commit_body }}
        V_DIFF_STAT: ${{ steps.context.outputs.diff_stat }}
        V_URLS: ${{ steps.context.outputs.urls }}
        V_CREDS: ${{ steps.context.outputs.creds }}
        V_DEPLOY_URL: ${{ steps.context.outputs.deploy_url }}
        V_STACK: ${{ steps.context.outputs.stack }}

name: 'Vibers Code Review'
description: 'Human-in-the-loop code review for vibecoded projects. Reviews commits against your spec, fixes issues, sends PRs.'
author: 'marsiandeployer'

branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  spec_url:
    description: 'URL to your spec document (Google Doc, Notion, etc.)'
    required: false
    default: ''
  review_scope:
    description: 'Review scope: full, security, spec-compliance'
    required: false
    default: 'full'
  telegram_contact:
    description: 'Your Telegram handle for review delivery'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Collect review context
      id: context
      shell: bash
      run: |
        # --- Changed files ---
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null || git diff --name-only HEAD~1)
        else
          FILES=$(git diff --name-only HEAD~1 2>/dev/null || echo "")
        fi
        FILE_COUNT=$(echo "$FILES" | grep -c '[^[:space:]]' || true)
        [ -z "$FILE_COUNT" ] && FILE_COUNT=0

        # --- Diff stat (zone of changes) ---
        DIFF_STAT=$(git diff --stat HEAD~1 2>/dev/null | tail -1 || true)

        # --- Commit message (subject + body) ---
        COMMIT_MSG=$(git log -1 --pretty=format:"%s" 2>/dev/null || echo "")
        COMMIT_BODY=$(git log -1 --pretty=format:"%b" 2>/dev/null || echo "")

        # --- Extract URLs from README ---
        URLS=""
        for f in README.md README.rst README readme.md; do
          if [ -f "$f" ]; then
            # Extract http(s) URLs, demo/staging/production/preview keywords nearby
            URLS=$(grep -oiE 'https?://[^ )"]+' "$f" 2>/dev/null | grep -viE 'shields\.io|github\.com/(actions|features|pricing)|img\.shields' | head -10 | sort -u || true)
            break
          fi
        done

        # --- Extract credentials/test accounts from README or .env.example ---
        CREDS=""
        for f in README.md README.rst readme.md .env.example .env.sample; do
          if [ -f "$f" ]; then
            # Look for login/password/email/test patterns
            FOUND=$(grep -inE '(test.*user|demo.*account|login|password|email.*test|credentials|default.*admin|guest|sample.*auth)' "$f" 2>/dev/null | head -5 || true)
            if [ -n "$FOUND" ]; then
              CREDS="${CREDS}${f}:\n${FOUND}\n"
            fi
          fi
        done

        # --- Check for deploy/preview URLs in package.json or config ---
        DEPLOY_URL=""
        if [ -f "package.json" ]; then
          DEPLOY_URL=$(jq -r '.homepage // empty' package.json 2>/dev/null || echo "")
        fi
        # Vercel/Netlify project
        if [ -f "vercel.json" ]; then
          DEPLOY_URL="${DEPLOY_URL} (vercel project)"
        fi
        if [ -f "netlify.toml" ]; then
          DEPLOY_URL="${DEPLOY_URL} (netlify project)"
        fi

        # --- Tech stack detection ---
        STACK=""
        [ -f "package.json" ] && STACK="${STACK}node " || true
        { [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; } && STACK="${STACK}python " || true
        [ -f "Gemfile" ] && STACK="${STACK}ruby " || true
        [ -f "go.mod" ] && STACK="${STACK}go " || true
        [ -f "Cargo.toml" ] && STACK="${STACK}rust " || true
        { [ -f "docker-compose.yml" ] || [ -f "Dockerfile" ]; } && STACK="${STACK}docker " || true
        [ -d ".github/workflows" ] && STACK="${STACK}ci " || true
        STACK=$(echo "$STACK" | xargs || echo "")

        # --- Output all ---
        echo "files<<EOF" >> $GITHUB_OUTPUT
        echo "$FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "count=$FILE_COUNT" >> $GITHUB_OUTPUT

        echo "diff_stat<<EOF" >> $GITHUB_OUTPUT
        echo "$DIFF_STAT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "commit_body<<EOF" >> $GITHUB_OUTPUT
        echo "$COMMIT_BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "urls<<EOF" >> $GITHUB_OUTPUT
        echo "$URLS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "creds<<EOF" >> $GITHUB_OUTPUT
        echo -e "$CREDS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "deploy_url<<EOF" >> $GITHUB_OUTPUT
        echo "$DEPLOY_URL" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        echo "stack=$STACK" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Notify Vibers
      shell: bash
      run: |
        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://vibers.onout.org/review" \
          -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg author "${{ github.actor }}" \
            --arg spec "${{ inputs.spec_url }}" \
            --arg scope "${{ inputs.review_scope }}" \
            --arg contact "${{ inputs.telegram_contact }}" \
            --arg files "${{ steps.context.outputs.files }}" \
            --arg commit_msg "${{ steps.context.outputs.commit_msg }}" \
            --arg commit_body "${{ steps.context.outputs.commit_body }}" \
            --arg diff_stat "${{ steps.context.outputs.diff_stat }}" \
            --arg urls "${{ steps.context.outputs.urls }}" \
            --arg creds "${{ steps.context.outputs.creds }}" \
            --arg deploy_url "${{ steps.context.outputs.deploy_url }}" \
            --arg stack "${{ steps.context.outputs.stack }}" \
            '{repo: $repo, branch: $branch, sha: $sha, author: $author, spec_url: $spec, scope: $scope, contact: $contact, changed_files: $files, commit_msg: $commit_msg, commit_body: $commit_body, diff_stat: $diff_stat, urls: $urls, creds: $creds, deploy_url: $deploy_url, stack: $stack}')" \
          2>/dev/null || echo -e '{"error":"network"}\n000')

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | head -1)

        if [ "$HTTP_CODE" = "200" ]; then
          echo "Vibers notified successfully"
        else
          echo "::warning::Vibers notification failed (HTTP $HTTP_CODE): $BODY"
        fi

        # Summary
        echo "## Vibers Review Submitted" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Repo:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** \`${{ github.sha }}\` — ${{ steps.context.outputs.commit_msg }}" >> $GITHUB_STEP_SUMMARY
        echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "**Stack:** ${{ steps.context.outputs.stack }}" >> $GITHUB_STEP_SUMMARY
        echo "**Stat:** ${{ steps.context.outputs.diff_stat }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Changed files (${{ steps.context.outputs.count }}):" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.context.outputs.files }}" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "**marsiandeployer** will review and submit a PR with fixes." >> $GITHUB_STEP_SUMMARY
